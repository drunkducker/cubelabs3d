name: CI

on:
  push:
    branches: [main, "claude/**", "gpt/**", "feature/**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: Build · Type · Lint · Test · Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
      # `npm audit` fails the job on HIGH+ findings — dependency drift becomes visible.
      - name: npm audit (high+ severity fails the job)
        run: npm audit --audit-level=high
